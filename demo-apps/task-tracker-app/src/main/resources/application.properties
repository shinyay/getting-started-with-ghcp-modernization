# Application Configuration
server.port=8081

# ⚠️ SECURITY ISSUE: Database credentials are hardcoded
# These should be stored in Azure Key Vault and accessed via Managed Identity
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=SuperSecret123!
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (for demo visibility)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

